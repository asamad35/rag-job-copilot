<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autofill V1</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="panel">
      <div class="header-row">
        <h1 class="title">Autofill Assistant</h1>
        <button
          id="close-popup-button"
          class="close-button"
          type="button"
          aria-label="Close popup"
        >
          ×
        </button>
      </div>
      <p id="field-count" class="count">Detected fields: -</p>
      <p id="file-count" class="file-count"></p>
      <button id="fill-profile-button" class="fill-button" type="button">
        Fill With Profile
      </button>
      <button id="fill-test-button" class="ghost-button" type="button">
        Fill With test
      </button>
      <p id="status" class="status" aria-live="polite"></p>
    </main>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
